{% extends "ui/base.html" %}
{% block title %}Выпускники{% endblock %}
{% block content %}
<h1 class="mb-4">🎓 Выпускники</h1>
<div class="card"><div class="card-body">
<table class="table table-hover">
<thead><tr><th>ФИО</th><th>Город</th><th>Работа</th><th>Компания</th></tr></thead>
<tbody>{% for user in users %}<tr><td>{{ user.fio }}</td><td>{{ user.city }}</td><td>{{ user.has_job }}</td><td>{{ user.job }}</td></tr>{% endfor %}</tbody>
</table></div></div>
{% endblock %}

services:
  - type: web
    name: diplom-django
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn app.wsgi:application"
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "diplom-django.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://diplom-django.onrender.com"
      - key: ACCOUNT_DEFAULT_HTTP_PROTOCOL
        value: "https"
      - key: ACCOUNT_EMAIL_VERIFICATION
        value: "mandatory"
      - key: DATABASE_URL
        fromDatabase:
          name: diplom-db
          property: connectionString

databases:
  - name: diplom-db
    plan: free